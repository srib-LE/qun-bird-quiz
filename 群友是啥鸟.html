<style>
/* ═══════════════ 2.jpg 暖色治愈 · Impeccable 精修 ═══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f3e8;--card:#fafaf5;--card2:#f0ecdb;--accent:#bec4a2;
  --accent2:#a3aa85;--gold:#c4a96a;--gold-light:#e8d5a8;
  --text:#5c5548;--muted:#6e685a;--white:#fdfcf7;
  --dim1:#d4955c;--dim2:#8b9a7e;--dim3:#c4a96a;
  --dim4:#d4a0a0;--dim5:#6b8a9e;
  --shadow:0 4px 24px rgba(80,70,50,.08);
  --shadow-lg:0 12px 48px rgba(80,70,50,.12);
  --ease-out: cubic-bezier(.16,1,.3,1);
  --ease-quart: cubic-bezier(.19,1,.22,1);
}
body{
  font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  overflow-x:hidden;line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ── Warm glow bg ── */
.bg-glow{position:fixed;pointer-events:none;z-index:0}
.bg-circle{
  border-radius:50%;
  background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
  opacity:.3;
}
.bg-circle-1{width:600px;height:600px;top:-200px;right:-150px;opacity:.25}
.bg-circle-2{width:500px;height:500px;bottom:-150px;left:-120px;opacity:.2}
.bg-circle-3{width:350px;height:350px;top:45%;left:55%;opacity:.18}

/* ── Screens ── */
.screen{display:none;position:relative;z-index:1;min-height:100vh}
.screen.active{display:flex;flex-direction:column;align-items:center}
#landing{justify-content:center;padding:40px 20px}
#quiz-screen{padding:20px}
#result-screen{padding:40px 20px}

/* ── Landing ── */
.hero{text-align:center;max-width:700px}
.hero .logo{
  font-size:2.8rem;font-weight:900;color:var(--accent2);
  letter-spacing:.06em;margin-bottom:4px;
}
.hero .sub{color:var(--muted);font-size:1.1rem;margin-bottom:8px}
.hero h1{font-size:2.2rem;margin-bottom:12px;line-height:1.3;color:var(--text)}
.hero .desc{color:var(--muted);font-size:1rem;margin-bottom:32px;max-width:500px;margin-inline:auto}

.bird-grid{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:32px;max-width:600px}
.bird-grid .bird-cell{
  width:60px;height:50px;border-radius:10px;overflow:hidden;
  background-image:url('111.jpg');background-size:500% 400%;
  transition:transform .25s,box-shadow .25s;cursor:default;
  border:2px solid var(--accent);box-shadow:0 2px 8px rgba(80,70,50,.06);
}
.bird-grid .bird-cell:hover{
  transform:scale(1.28);z-index:2;
  border-color:var(--gold);box-shadow:0 4px 20px rgba(196,169,106,.35);
}

.btn{
  display:inline-flex;align-items:center;gap:8px;padding:14px 40px;
  border-radius:50px;font-size:1.1rem;font-weight:700;border:none;cursor:pointer;
  transition:all .25s;text-decoration:none;color:#fff;font-family:inherit;
  background:var(--accent2);
  box-shadow:0 4px 16px rgba(163,170,133,.3);
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(163,170,133,.4);background:#919a72}
.btn:active{transform:scale(.97)}

.btn-outline{
  background:transparent;border:2px solid var(--accent);
  color:var(--accent2);
}
.btn-outline:hover{background:rgba(190,196,162,.2)}

/* ── Quiz ── */
.quiz-container{max-width:640px;width:100%;margin:0 auto}
.progress-wrap{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.progress-bar{flex:1;height:6px;background:var(--accent);border-radius:10px;overflow:hidden;opacity:.5}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--gold));border-radius:10px;transition:width .4s}
.progress-text{font-size:.85rem;color:var(--muted);white-space:nowrap}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:32px;flex-wrap:wrap}
.progress-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);opacity:.4;transition:all .3s}
.progress-dot.done{background:var(--accent2);opacity:1}
.progress-dot.current{background:var(--gold);opacity:1;box-shadow:0 0 8px var(--gold-light);transform:scale(1.3)}

.question-card{
  background:var(--card);border-radius:24px;padding:32px;margin-bottom:20px;
  border:1px solid rgba(190,196,162,.3);box-shadow:var(--shadow);
  transition:transform .35s var(--ease-out),opacity .3s ease-out;
}
.question-num{
  font-size:.85rem;color:var(--accent2);font-weight:700;margin-bottom:8px;
  display:inline-block;background:var(--card2);padding:4px 14px;border-radius:20px;
}
.question-text{font-size:1.25rem;font-weight:700;margin-bottom:28px;line-height:1.5;color:var(--text)}

.options{display:flex;flex-direction:column;gap:12px}
.option{
  display:flex;align-items:flex-start;gap:14px;padding:16px 20px;
  background:var(--white);border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:all .25s;
  text-align:left;color:var(--text);font-size:1rem;line-height:1.5;
}
.option:hover{border-color:var(--accent);background:var(--card2);transform:translateX(4px)}
.option.selected{
  border-color:var(--accent2);background:#edf0e0;box-shadow:0 2px 12px rgba(163,170,133,.15);
  pointer-events:none;
}
.option .opt-letter{
  flex-shrink:0;width:32px;height:32px;border-radius:50%;
  background:var(--card2);display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:.9rem;color:var(--accent2);
  transition:all .3s var(--ease-quart);
}
.option.selected .opt-letter{
  background:var(--accent2);color:#fff;
  animation: popCheck .4s var(--ease-quart);
}
@keyframes popCheck{
  0%{transform:scale(1)}
  50%{transform:scale(1.15)}
  100%{transform:scale(1)}
}

/* Option exit stagger */
.option.exiting{
  opacity:0;transform:translateX(-20px);
  transition:all .35s ease-in;
}
.option.exiting:nth-child(2){transition-delay:.04s}
.option.exiting:nth-child(3){transition-delay:.08s}
.option.exiting:nth-child(4){transition-delay:.12s}

.nav-btns{display:flex;justify-content:space-between;align-items:center;margin-top:24px}
.nav-btns .btn{padding:12px 28px;font-size:.95rem}
.auto-hint{font-size:.8rem;color:var(--muted);letter-spacing:.04em;animation:pulseHint 2.5s ease-in-out infinite}
@keyframes pulseHint{0%,100%{opacity:.5}50%{opacity:1}}

/* ── Result ── */
.result-card{max-width:560px;width:100%;text-align:center}
.result-label{font-size:.9rem;color:var(--accent2);font-weight:700;margin-bottom:8px;letter-spacing:2px}
.result-bird-img{
  width:200px;height:167px;margin:0 auto 20px;border-radius:20px;overflow:hidden;
  background-image:url('111.jpg');background-size:500% 400%;
  border:3px solid var(--accent);box-shadow:0 8px 40px rgba(163,170,133,.2);
}
.result-bird-name{font-size:2.8rem;font-weight:900;margin-bottom:4px;color:var(--text)}
.result-bird-tag{font-size:1.2rem;color:var(--accent2);margin-bottom:20px}
.result-bird-desc{
  background:var(--card);border-radius:16px;padding:24px;
  font-size:1.05rem;line-height:1.7;color:var(--text);
  margin-bottom:28px;border:1px solid rgba(190,196,162,.2);
}

.dimension-bars{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.dim-row{display:flex;align-items:center;gap:12px}
.dim-label{width:80px;font-size:.8rem;color:var(--muted);text-align:right;flex-shrink:0}
.dim-bar-wrap{flex:1;height:8px;background:var(--accent);border-radius:10px;overflow:hidden;opacity:.5}
.dim-bar-fill{height:100%;border-radius:10px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.dim-val{width:28px;font-size:.8rem;color:var(--muted);flex-shrink:0}

.result-actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease-out}
@keyframes scaleIn{
  0%{opacity:0;transform:scale(.9)}
  100%{opacity:1;transform:scale(1)}
}
.bounce-in{animation:scaleIn .45s var(--ease-quart)}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* ── Mobile ── */
@media(max-width:600px){
  .hero .logo{font-size:2rem}
  .hero h1{font-size:1.5rem}
  .bird-grid .bird-cell{width:44px;height:37px}
  .question-card{padding:20px}
  .question-text{font-size:1.1rem}
  .option{padding:14px 16px;font-size:.9rem;min-height:50px}
  .result-bird-img{width:150px;height:125px}
  .result-bird-name{font-size:2rem}
}

/* ── Reduced motion ── */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{
    animation-duration:.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:.01ms !important;
  }
  .feather{display:none}
}

/* ── Focus visible ── */
:focus-visible{
  outline:2px solid var(--accent2);
  outline-offset:3px;
  border-radius:4px;
}
.btn:focus-visible{outline-offset:4px;border-radius:50px}
.option:focus-visible{outline-offset:-1px;border-radius:14px}

/* ── Heading balance ── */
.hero h1,.question-text,.result-bird-name,.result-bird-tag{text-wrap:balance}

/* Feather particles */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0}
.feather{
  position:absolute;font-size:1.5rem;animation:fall linear forwards;
  opacity:.35;filter:grayscale(0);
}
@keyframes fall{
  0%{transform:translateY(-10vh) rotate(0deg);opacity:.35}
  100%{transform:translateY(110vh) rotate(720deg);opacity:0}
}
</style>
</head>

<!-- ════════════ RESULT ════════════ -->
<div class="screen" id="result-screen">

</div>

    desc:'上一秒在技术群对线，下一秒在摸鱼群发癫。风格切换如翻书，每条河你都能游。没有人能定义你是什么人设——因为你的人设就是没有人设。灵活是你的本质，多变是你的底色。',
    profile:[9,8,8,8,7] }

const DIMENSIONS = [
  { key:'freq',  name:'活跃度',   low:'深潜海底', high:'龙王在世', color:'var(--dim1)' },

  { key:'express', name:'表达欲', low:'理性克制', high:'情绪释放', color:'var(--dim3)' },
  { key:'belong', name:'归属感',  low:'边缘路人', high:'核心灵魂', color:'var(--dim4)' },
  { key:'fight', name:'战斗力',   low:'爱与和平', high:'不服就干', color:'var(--dim5)' }
];

const QUESTIONS = [

  { id:1, dim:'freq', text:'你打开QQ，发现群里已经聊了99+，你的第一反应是？',

  { id:2, dim:'freq', text:'群主@所有人发了一条通知，你会？',
    opts:['已读不回，@所有人对我无效','看完内容，在心里默默回了一句收到','回个表情包表示"已阅"','秒回并顺势带起一波新话题'] },
  { id:3, dim:'freq', text:'你发现群里已经连续安静了两个小时，你会？',

  // 维度二：影响力 (style) — Q4-6
  { id:4, dim:'style', text:'看到群友在刷"+1"队形，你会？',
    opts:['无视队形，甚至觉得有点烦','精准+1，保持队形整齐绝不破坏','先+1再偷偷把下一轮打成+2整活','我才是第一个发+1的人，队形是我带起来的'] },
  { id:5, dim:'style', text:'群友从别的群／平台搬运了一坨"屎"（迷惑发言、逆天截图、尴尬内容），你会？',
    opts:['看一眼标题就划走了，别人搬的屎我一口都不尝','点开看完，在心里评判"这什么玩意儿"，但不发表意见','回一个"典中典""难绷""抽象"之类的锐评，简洁有力','立刻存图／截图转发到其他群，让更多人品尝这坨好屎'] },
  { id:6, dim:'style', text:'群友抛出一个话题冷场了，没人接，你会？',
    opts:['看它沉下去，冷掉的话题没有抢救价值','心里默默替群友尴尬一秒，但还是不接','回一个"确实"或者表情包，假装有人在聊','必须接！不能让话掉地上，硬接也要接'] },

  // 维度三：表达欲 (express) — Q7-9
  { id:7, dim:'express', text:'群友在激烈讨论一个你懂的话题，但有人说错了，你会？',
    opts:['懒得指正，网友的对错与我何干','默默打一段有理有据的纠正，写完又删了','发一条链接或截图作为证据，不多说一句废话','"不是，你在这瞎说什么呢？"直接开怼'] },
  { id:8, dim:'express', text:'深夜一点，群里只剩你和另一个群友在线，你会？',
    opts:['不觉得有什么特别的，该干嘛干嘛','犹豫要不要说话，算了继续潜水','发一句"还没睡啊"开启深夜闲聊模式','开始倾诉今天发生的所有事，顺便感慨一下人生'] },
  { id:9, dim:'express', text:'你在群里分享了一个观点，有人表示不赞同，你会？',
    opts:['无所谓，每个人有自己的看法，不继续争','再解释一遍但语气非常克制温和','摆事实讲道理，用数据说服对方','必须辩清楚，今晚不睡觉也要把这个问题论明白'] },

  // 维度四：归属感 (belong) — Q10-12
  { id:10, dim:'belong', text:'群里来了一个新人，大家都不认识，你会？',
    opts:['跟我没关系，新人自有群主欢迎','潜水观察几天看看这人什么成分','发个"欢迎"表情包表示友好','主动招呼，"新人爆照！""哪个区的？"拉满仪式感'] },
  { id:11, dim:'belong', text:'群里组织线下聚会／游戏开黑，你会？',
    opts:['假装没看见，线下社交太累了','看到了但从不报名，云参与一下就行','看情况，人多了我就去蹭蹭热闹','第一个报名，甚至还帮忙张罗组织人手'] },
  { id:12, dim:'belong', text:'如果这个群突然解散了，你的感受是？',
    opts:['毫无波澜，可能过一个月才会发现','有点可惜，但也就这样吧','会想念，毕竟看了这么久大家聊天','像失去了一个家，立刻建新群把人都拉回来'] },

  // 维度五：战斗力 (fight) — Q13-15
  { id:13, dim:'fight', text:'群里两个人因为一件事吵起来了，火药味很重，你会？',
    opts:['关闭群聊，等吵完了再回来，不想溅一身血','默默围观全程，在心里给双方打分','跳出来劝和，"兄弟们冷静一下各退一步"','加入战场，帮更有道理的那一方输出'] },
  { id:14, dim:'fight', text:'有人发了一条明显带节奏／引战的言论，你会？',
    opts:['心中毫无波澜，引战帖见多了，划过去就行','觉得不舒服但选择无视，不值得浪费时间','发个"典""绷""乐"之类的抽象评论，嘲讽但不点破','直接开怼，"发这个什么意思？说清楚"必须对线到底'] },
  { id:15, dim:'fight', text:'你被群友艾特调侃了一句（玩笑性质），你的反应是？',
    opts:['完全没注意到被艾特了，或者假装没看到','看到了笑一笑但不回复，优雅无视','回一个愤怒（假装）表情包，配合演出','立刻反击，玩笑开回去，必须比对方更狠才开心'] }
];

// ═══════════════ STATE ═══════════════
let currentQ = 0;
let answers = new Array(15).fill(-1);
let isAdvancing = false; // prevent double-tap during auto-advance
const SPRITE_COLS = 5;
const SPRITE_ROWS = 4;

// ═══════════════ INIT ═══════════════
function init() {
  createBirdGrid();
  createProgressDots();
}
function createBirdGrid() {
  const g = document.getElementById('birdGrid');
  BIRDS.forEach((b, i) => {
    const cell = document.createElement('div'); cell.className = 'bird-cell';
    cell.style.backgroundPosition = birdPos(i);
    cell.title = b.emoji + ' ' + b.name + ' — ' + b.tag;
    g.appendChild(cell);
  });
}
function birdPos(index) {
  const col = index % SPRITE_COLS;
  const row = Math.floor(index / SPRITE_COLS);
  const xPct = (col / (SPRITE_COLS - 1)) * 100;
  const yPct = (row / (SPRITE_ROWS - 1)) * 100;
  return `${xPct}% ${yPct}%`;
}
function setResultBirdImg(index) {
  const el = document.getElementById('resultImg');
  el.style.backgroundPosition = birdPos(index);
}

// ═══════════════ SCREEN SWITCHING ═══════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════ QUIZ LOGIC ═══════════════
function startQuiz() {
  currentQ = 0;
  answers = new Array(15).fill(-1);
  showScreen('quiz-screen');
  spawnFeathers(8);
  renderQuestion();
}
function createProgressDots() {
  const c = document.getElementById('progressDots');
  c.innerHTML = '';
  for (let i = 0; i < 15; i++) {
    const d = document.createElement('span'); d.className = 'progress-dot';
    d.id = 'dot' + i; c.appendChild(d);
  }
}
function updateProgressDots() {
  for (let i = 0; i < 15; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'progress-dot';
    if (answers[i] >= 0) d.classList.add('done');
    if (i === currentQ) d.classList.add('current');
  }
}
function renderQuestion() {
  const q = QUESTIONS[currentQ];
  document.getElementById('questionNum').textContent = `第 ${q.id} 题 · ${dimLabel(q.dim)}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${currentQ + 1} / 15`;

  const optsEl = document.getElementById('options');
  const letters = ['A','B','C','D'];
  optsEl.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    if (answers[currentQ] === i) btn.classList.add('selected');
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectOption(i);
    optsEl.appendChild(btn);
  });

  const btnPrev = document.getElementById('btnPrev');
  btnPrev.style.visibility = currentQ === 0 ? 'hidden' : 'visible';

  const hint = document.getElementById('autoHint');
  if (hint) hint.style.display = currentQ === 14 ? 'none' : '';

  updateProgressDots();
  const card = document.getElementById('questionCard');
  card.classList.remove('fade-up');
  void card.offsetWidth;
  card.classList.add('fade-up');
  // Update progress fill to reflect answered state
  document.getElementById('progressFill').style.width = ((currentQ + 1) / 15 * 100) + '%';
}
function dimLabel(dimKey) {
  const d = DIMENSIONS.find(dd => dd.key === dimKey);
  return d ? d.name : dimKey;
}
function selectOption(idx) {
  if (isAdvancing) return; // prevent double-tap during animation
  isAdvancing = true;
  answers[currentQ] = idx;
  updateProgressDots();

  // Highlight the selected option
  const allOpts = document.querySelectorAll('#options .option');
  allOpts.forEach((o, i) => { if (i === idx) o.classList.add('selected'); });

  // Staggered exit animation
  setTimeout(() => {
    allOpts.forEach(o => o.classList.add('exiting'));
  }, 180);

  // Auto-advance after animation
  setTimeout(() => {
    if (currentQ < 14) {
      currentQ++;
      renderQuestion();
      spawnFeathers(2);
    } else {
      showResult();
    }
    window.scrollTo({ top: 0, behavior: 'smooth' });
    isAdvancing = false;
  }, 520);
}
function nextQuestion() {
  // Still available as fallback, but auto-advance is the primary flow
  if (answers[currentQ] < 0) return;
  if (currentQ < 14) {
    currentQ++;
    renderQuestion();
    spawnFeathers(2);
  } else {
    showResult();
  }
}
function prevQuestion() {
  if (currentQ > 0) {
    currentQ--;
    renderQuestion();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// ═══════════════ SCORING ═══════════════
function calcScores() {
  const scores = { freq:0, style:0, express:0, belong:0, fight:0 };
  QUESTIONS.forEach((q, i) => {
    if (answers[i] >= 0) {
      scores[q.dim] += (answers[i] + 1);
    }
  });
  return scores;
}
function findBestBird(scores) {
  const userVec = [
    scores.freq, scores.style, scores.express, scores.belong, scores.fight
  ];
  let best = 0, bestDist = Infinity;
  BIRDS.forEach((b, i) => {
    const dist = b.profile.reduce((sum, v, j) => sum + Math.pow(v - userVec[j], 2), 0);
    if (dist < bestDist) { bestDist = dist; best = i; }
  });
  return best;
}

// ═══════════════ RESULT ═══════════════
function showResult() {
  const scores = calcScores();
  const birdIdx = findBestBird(scores);
  const bird = BIRDS[birdIdx];

  showScreen('result-screen');
  setResultBirdImg(birdIdx);
  document.getElementById('resultName').textContent = bird.emoji + ' ' + bird.name;
  document.getElementById('resultTag').textContent = bird.tag;
  document.getElementById('resultDesc').textContent = bird.desc;
  if (bird.special) {
    document.querySelector('.result-label').textContent = '⭐ 隐藏结局';
    document.querySelector('.result-label').style.color = 'var(--gold)';
  } else {
    document.querySelector('.result-label').textContent = '你的群聊人格是';
    document.querySelector('.result-label').style.color = 'var(--accent2)';
  }

  const bars = document.getElementById('dimensionBars');
  const dimKeys = ['freq','style','express','belong','fight'];
  bars.innerHTML = DIMENSIONS.map((d, i) => {
    const val = scores[d.key];
    const pct = (val - 3) / 9 * 100;
    return `<div class="dim-row">
      <span class="dim-label">${d.name}</span>
      <span style="font-size:.75rem;color:${d.color};width:40px;text-align:right;flex-shrink:0">${d.low}</span>
      <div class="dim-bar-wrap"><div class="dim-bar-fill" style="width:${pct}%;background:${d.color}"></div></div>
      <span style="font-size:.75rem;color:${d.color};width:40px;flex-shrink:0">${d.high}</span>
    </div>`;
  }).join('');

  spawnFeathers(20);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function restartQuiz() {
  currentQ = 0;
  answers = new Array(15).fill(-1);
  startQuiz();
}
function shareResult() {
  const bird = BIRDS[findBestBird(calcScores())];
  const text = `🦜 群友是啥鸟？\n\n我是【${bird.emoji} ${bird.name}】——${bird.tag}\n\n"${bird.desc}"\n\n你也来测测：群友是啥鸟？`;
  navigator.clipboard.writeText(text).then(() => {
    alert('✅ 结果已复制到剪贴板！转发到群里让大家也测测吧~');
  }).catch(() => {
    prompt('复制下面的文字分享给群友吧：', text);
  });
}

// ═══════════════ PARTICLES ═══════════════
function spawnFeathers(count) {
  const container = document.getElementById('particles');
  const emojis = ['🪶','✨','💫','🍃','🕊️','🌿'];
  for (let i = 0; i < count; i++) {
    const f = document.createElement('span'); f.className = 'feather';
    f.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    f.style.left = Math.random() * 100 + '%';
    f.style.animationDuration = (2 + Math.random() * 4) + 's';
    f.style.animationDelay = Math.random() * .5 + 's';
    f.style.fontSize = (1 + Math.random() * 1.5) + 'rem';
    container.appendChild(f);
    setTimeout(() => f.remove(), 5000);
  }
}

// ═══════════════ COUNTER ═══════════════
(function loadCounter(){
  const container = document.getElementById('viewCounter');
  if (!container) return;
  // Use badge-style counter via hits.sh (image-based, no CORS issue)
  const img = document.createElement('img');
  img.src = 'https://hits.sh/srib-le.github.io/qun-bird-quiz.svg?style=flat&label=%F0%9F%91%80&color=a3aa85&labelColor=f0ecdb';
  img.alt = 'page views';
  img.style.height = '20px';
  img.style.verticalAlign = 'middle';
  img.onerror = function(){ container.style.display = 'none'; };
  // Replace the span with the image
  const span = document.getElementById('viewCount');
  if (span) span.replaceWith(img);
})();

// ═══════════════ START ═══════════════
init();

// ═══════════════ KEYBOARD ═══════════════
document.addEventListener('keydown', (e) => {
  if (document.getElementById('result-screen').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextQuestion();
  if (e.key === 'ArrowLeft') prevQuestion();
  const num = parseInt(e.key);
  if (num >= 1 && num <= 4 && QUESTIONS[currentQ]) {
    selectOption(num - 1);
  }
});
</script>
